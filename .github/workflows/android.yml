name: Build Rumo APK (Native + GPS Fixed)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android
        run: |
          rm -rf android
          npx cap add android

      - name: Smart Asset Generation (Icon/Splash)
        run: |
          if [ -f "public/Icon.png" ]; then
            echo "Icon.png encontrado. Gerando assets nativos..."
            mkdir -p assets
            cp public/Icon.png assets/icon.png
            cp public/Icon.png assets/splash.png
            # Gera os recursos para o Android
            npx @capacitor/assets generate --android --assetPath assets
          else
            echo "Aviso: public/Icon.png não encontrado. Pulando geração de ícones customizados."
          fi

      - name: Scripted Manifest & Permissions Injection
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "Injetando permissões críticas no AndroidManifest..."
            
            # Criamos o bloco de permissões baseado no projeto de sucesso
            cat <<EOF > native_perms.xml
    <!-- PERMISSÕES DE LOCALIZAÇÃO (GPS NATIVO) -->
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
    
    <!-- CONECTIVIDADE E NOTIFICAÇÕES -->
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
    <uses-permission android:name="android.permission.VIBRATE" />
    <uses-permission android:name="android.permission.WAKE_LOCK" />
    
    <!-- RECURSOS DO SISTEMA -->
    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />
    
    <!-- HARDWARE REQUIREMENTS -->
    <uses-feature android:name="android.hardware.location.gps" android:required="true" />
EOF

            # Removemos permissões existentes para evitar duplicação ou conflitos
            sed -i '/android.permission/d' $MANIFEST
            sed -i '/android.hardware.location.gps/d' $MANIFEST

            # Inserimos o bloco novo logo após a tag <manifest>
            sed -i '/<manifest/r native_perms.xml' $MANIFEST
            
            # Suporte a Picture-in-Picture e Estabilização de Rotação na Activity Principal
            sed -i 's/<activity/<activity android:supportsPictureInPicture="true" android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"/g' $MANIFEST
            
            echo "Manifesto injetado com sucesso."
          else
            echo "Erro crítico: Arquivo de manifesto não encontrado!"
            exit 1
          fi

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK (Gradle Optimized)
        run: |
          cd android
          chmod +x gradlew
          # Otimização de memória e daemon desativado como solicitado
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx2048m

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rumo-native-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
