name: Build Android APK (Rumo - Final Fix)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Fresh Install
        run: |
          rm -rf android
          npx cap add android

      - name: Super Manifest Permission Injection
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "Formatando o Manifesto com permissões definitivas..."
            
            # Criamos o bloco de permissões que OBRIGATORIAMENTE deve estar no topo
            cat <<EOF > perms_final.xml
    <!-- PERMISSÕES DE LOCALIZAÇÃO CRÍTICAS -->
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
    
    <!-- PERMISSÕES DE REDE E NOTIFICAÇÃO -->
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
    <uses-permission android:name="android.permission.WAKE_LOCK" />
    
    <!-- HARDWARE -->
    <uses-feature android:name="android.hardware.location.gps" android:required="true" />
EOF

            # Limpeza total de menções anteriores
            sed -i '/android.permission/d' $MANIFEST
            sed -i '/android.hardware.location.gps/d' $MANIFEST

            # Injeção logo após a tag de abertura <manifest>
            sed -i '/<manifest/r perms_final.xml' $MANIFEST
            
            # Ajuste de Atividade para suportar tudo (PiP, Rotação, etc)
            sed -i 's/<activity/<activity android:supportsPictureInPicture="true" android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"/g' $MANIFEST
            
            echo "Manifesto processado. Verificando resultado:"
            cat $MANIFEST | grep -E "uses-permission|uses-feature"
          else
            echo "ERRO: Manifesto não encontrado no path padrão!"
            exit 1
          fi

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rumo-app-v6-fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk
