name: Build Android APK (Rumo - Fixed GPS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Fresh Add
        run: |
          rm -rf android
          npx cap add android

      - name: Hardened Permission Injection
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "Injetando permissões críticas no Manifesto..."
            
            # Criamos o bloco de permissões limpo e explícito
            cat <<EOF > perms.xml
    <!-- Permissões de Localização (GPS) -->
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
    
    <!-- Permissões de Sistema e Redes -->
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.WAKE_LOCK" />
    
    <!-- Permissões de Notificação (Android 13+) -->
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
    
    <!-- Requisitos de Hardware -->
    <uses-feature android:name="android.hardware.location.gps" android:required="true" />
EOF

            # Removemos qualquer tentativa anterior para não duplicar
            sed -i '/android.permission.ACCESS_COARSE_LOCATION/d' $MANIFEST
            sed -i '/android.permission.ACCESS_FINE_LOCATION/d' $MANIFEST
            sed -i '/android.permission.ACCESS_BACKGROUND_LOCATION/d' $MANIFEST
            sed -i '/android.permission.FOREGROUND_SERVICE/d' $MANIFEST
            sed -i '/android.permission.INTERNET/d' $MANIFEST
            sed -i '/android.permission.ACCESS_NETWORK_STATE/d' $MANIFEST
            sed -i '/android.permission.WAKE_LOCK/d' $MANIFEST
            sed -i '/android.permission.POST_NOTIFICATIONS/d' $MANIFEST
            sed -i '/android.hardware.location.gps/d' $MANIFEST

            # Inserção Robusta: Injetamos logo abaixo da tag <manifest
            sed -i '/<manifest/r perms.xml' $MANIFEST
            
            # Ativamos o Picture-in-Picture na Activity Principal
            # Substituímos a tag de abertura da atividade para incluir o PiP
            sed -i 's/<activity/<activity android:supportsPictureInPicture="true" android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"/g' $MANIFEST
            
            echo "Manifesto injetado. Verificação de permissões:"
            grep "uses-permission" $MANIFEST
          else
            echo "ERRO CRÍTICO: Manifesto não encontrado!"
            exit 1
          fi

      - name: Final Capacitor Sync
        run: npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rumo-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
