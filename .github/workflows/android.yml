name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Android Setup
        run: |
          if [ -d "android" ]; then
            rm -rf android
          fi
          npx cap add android
          npx cap sync android

      - name: Hardened Manifest Permission Injection
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "Injetando permissões críticas no Manifesto..."
            
            # Removemos qualquer declaração existente para evitar conflitos
            sed -i '/android.permission.ACCESS_COARSE_LOCATION/d' $MANIFEST
            sed -i '/android.permission.ACCESS_FINE_LOCATION/d' $MANIFEST
            sed -i '/android.permission.ACCESS_BACKGROUND_LOCATION/d' $MANIFEST
            sed -i '/android.permission.INTERNET/d' $MANIFEST
            sed -i '/android.permission.ACCESS_NETWORK_STATE/d' $MANIFEST
            sed -i '/android.permission.POST_NOTIFICATIONS/d' $MANIFEST
            sed -i '/android.hardware.location.gps/d' $MANIFEST

            # Criamos o bloco de permissões (Padrão Android 12/13+)
            # Fine Location e Coarse Location são essenciais
            PERMS='    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-feature android:name="android.hardware.location.gps" android:required="true" />'
            
            # Injetamos imediatamente após a tag <manifest ...>
            # Isso garante que o Android veja as permissões antes de qualquer erro no resto do XML
            sed -i "/<manifest/a $PERMS" $MANIFEST
            
            # Habilitamos Picture-in-Picture e correções de configuração
            sed -i 's/<activity/<activity android:supportsPictureInPicture="true" android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"/g' $MANIFEST
            
            echo "Manifesto injetado. Conteúdo verificado:"
            grep "uses-permission" $MANIFEST
          else
            echo "Erro Crítico: Manifesto não encontrado no caminho $MANIFEST"
            exit 1
          fi

      - name: Final Capacitor Sync
        run: npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rumo-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
