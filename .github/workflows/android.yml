name: Build Android APK (Rumo)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Android Setup
        run: |
          # Clean rebuild to ensure fresh native project
          rm -rf android
          npx cap add android

      - name: Inject Hardware and Location Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "Injecting hardened location and hardware permissions..."
            
            # Temporary permissions list
            cat <<EOF > perms_block.txt
    <!-- MotoTrip / Rumo Required Permissions -->
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
    <uses-feature android:name="android.hardware.location.gps" android:required="true" />
EOF

            # Remove previous injections to avoid mess
            sed -i '/android.permission.ACCESS_COARSE_LOCATION/d' $MANIFEST
            sed -i '/android.permission.ACCESS_FINE_LOCATION/d' $MANIFEST
            sed -i '/android.permission.ACCESS_BACKGROUND_LOCATION/d' $MANIFEST
            sed -i '/android.permission.FOREGROUND_SERVICE/d' $MANIFEST
            sed -i '/android.permission.INTERNET/d' $MANIFEST
            sed -i '/android.permission.ACCESS_NETWORK_STATE/d' $MANIFEST
            sed -i '/android.permission.POST_NOTIFICATIONS/d' $MANIFEST
            sed -i '/android.hardware.location.gps/d' $MANIFEST
            sed -i '/MotoTrip \/ Rumo Required Permissions/d' $MANIFEST

            # Inject the block before the <application tag
            sed -i '/<application/e cat perms_block.txt' $MANIFEST
            
            # PIP Mode enabling
            sed -i 's/<activity/<activity android:supportsPictureInPicture="true" android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"/g' $MANIFEST
            
            echo "Verification of injected permissions:"
            grep "uses-permission" $MANIFEST
          else
            echo "CRITICAL: AndroidManifest.xml not found!"
            exit 1
          fi

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rumo-app-final-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
